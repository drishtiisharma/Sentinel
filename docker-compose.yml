version: '3.8'

services:
  aiops-backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=sqlite:///./data/aiops.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

